openapi: 3.0.0
info:
  description: This is the API for the EODHP Workspace Services.
  title: EODHP Workspace Services API
  contact: {}
  version: v1
paths:
  /accounts:
    get:
      description: Retrieve a list of billing accounts owned by the authenticated user.
      tags:
        - Billing and Billing Accounts
      summary: Get billing accounts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/models.Account"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
  "/accounts/{id}":
    get:
      description: Retrieve details of a specific billing account by its unique ID.
      tags:
        - Billing and Billing Accounts
      summary: Get a billing account
      parameters:
        - description: Account ID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.Account"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
  /workspaces:
    get:
      description: Retrieve a list of workspaces for the authenticated user.
      tags:
        - Workspace Management
      summary: Get a list of workspaces you are a member of
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/models.WorkspaceSettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
  "/workspaces/{workspace-id}":
    get:
      description: Retrieve a specific workspace using its ID for the authenticated user.
      tags:
        - Workspace Management
      summary: Get a workspace by ID
      parameters:
        - description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.WorkspaceSettings"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
  "/workspaces/{workspace-id}/files":
    get:
      security:
        - BearerAuth: []
      description: List files for object and/or block stores in a workspace.
      tags:
        - Workspace Files Management
      summary: List files in a workspace
      parameters:
        - description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
        - description: "Store type: object or block"
          name: store
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/services.FileListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
  "/workspaces/{workspace-id}/files/block":
    post:
      security:
        - BearerAuth: []
      description: Upload files to the workspace block store.
      tags:
        - Workspace Files Management
      summary: Upload files to the workspace block store
      parameters:
        - description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/postWorkspaces_workspaceId_filesBlock"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/services.FileUploadResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
    delete:
      security:
        - BearerAuth: []
      description: Delete a file from the workspace block store.
      tags:
        - Workspace Files Management
      summary: Delete a file from the workspace block store
      parameters:
        - description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
        - description: File name to delete
          name: file
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/services.FileDeleteResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: string
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/services.FileDeleteResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
  "/workspaces/{workspace-id}/files/block/metadata":
    get:
      security:
        - BearerAuth: []
      description: Get metadata for a single file in the workspace block store.
      tags:
        - Workspace Files Management
      summary: Get block store file metadata
      parameters:
        - description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
        - description: File name within the workspace
          name: file
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/services.FileMetadataResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
  "/workspaces/{workspace-id}/files/object":
    post:
      security:
        - BearerAuth: []
      description: Upload files to the workspace object store.
      tags:
        - Workspace Files Management
      summary: Upload files to the workspace object store
      parameters:
        - description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/postWorkspaces_workspaceId_filesBlock"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/services.FileUploadResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
    delete:
      security:
        - BearerAuth: []
      description: Delete a file from the workspace object store.
      tags:
        - Workspace Files Management
      summary: Delete a file from the workspace object store
      parameters:
        - description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
        - description: File name to delete
          name: file
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/services.FileDeleteResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: string
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/services.FileDeleteResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
  "/workspaces/{workspace-id}/files/object/metadata":
    get:
      security:
        - BearerAuth: []
      description: Get metadata for a single file in the workspace object store.
      tags:
        - Workspace Files Management
      summary: Get object store file metadata
      parameters:
        - description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
        - description: File name within the workspace
          name: file
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/services.FileMetadataResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
  "/workspaces/{workspace-id}/users":
    get:
      description: Retrieve a list of users who are members of the specified workspace.
      tags:
        - Workspace Management
      summary: Get users of a workspace
      parameters:
        - description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/models.User"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
  "/workspaces/{workspace-id}/users/{username}":
    get:
      description: Retrieve details of a specific user that is a member of the
        specified workspace.
      tags:
        - Workspace Management
      summary: Get a user of a workspace
      parameters:
        - description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
        - description: Username
          name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/models.User"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
    put:
      description: Add a user to the specified workspace by providing the workspace ID
        and username.
      tags:
        - Workspace Management
      summary: Add a user to a workspace
      parameters:
        - description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
        - description: Username
          name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
    delete:
      description: Remove a user from the specified workspace by providing the
        workspace ID and username.
      tags:
        - Workspace Management
      summary: Remove a user from a workspace
      parameters:
        - description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
        - description: Username
          name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
  "/workspaces/{workspace-id}/{user-id}/s3-tokens":
    post:
      description: Request S3 session credentials for user access to a single
        workspace. {user-id} can be set to "me" to use the token owner's user
        id.
      tags:
        - Workspace Management
      summary: Request S3 session credentials
      parameters:
        - example: my-workspace
          description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
        - example: me
          description: User ID
          name: user-id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.S3Credentials"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
  "/workspaces/{workspace-id}/{user-id}/sessions":
    post:
      description: Request workspace scoped session credentials for user access to a
        single workspace. {user-id} can be set to "me" to use the token owner's
        user id.
      tags:
        - Workspace Management
      summary: Request workspace scoped session credentials
      parameters:
        - example: my-workspace
          description: Workspace ID
          name: workspace-id
          in: path
          required: true
          schema:
            type: string
        - example: me
          description: User ID
          name: user-id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.AuthSessionResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
components:
  requestBodies:
    postWorkspaces_workspaceId_filesBlock:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              files:
                description: Files to upload
                type: string
                format: binary
            required:
              - files
      required: true
  securitySchemes:
    BearerAuth:
      type: apiKey
      name: Authorization
      in: header
  schemas:
    handlers.AuthSessionResponse:
      type: object
      properties:
        access:
          type: string
        accessExpiry:
          type: string
        refresh:
          type: string
        refreshExpiry:
          type: string
        scope:
          type: string
    handlers.S3Credentials:
      type: object
      properties:
        accessKeyId:
          type: string
        expiration:
          type: string
        secretAccessKey:
          type: string
        sessionToken:
          type: string
    models.Account:
      type: object
      properties:
        accountOpeningReason:
          type: string
        accountOwner:
          type: string
        billingAddress:
          type: string
        createdAt:
          type: string
        id:
          type: string
        name:
          type: string
        organizationName:
          type: string
        status:
          type: string
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/models.WorkspaceSettings"
    models.BlockStore:
      type: object
      properties:
        access_point_id:
          type: string
        mount_point:
          type: string
        name:
          type: string
        store_id:
          type: string
    models.ObjectStore:
      type: object
      properties:
        access_point_arn:
          type: string
        access_url:
          type: string
        bucket:
          type: string
        env_var:
          type: string
        host:
          type: string
        name:
          type: string
        prefix:
          type: string
        store_id:
          type: string
    models.Stores:
      type: object
      properties:
        block:
          type: array
          items:
            $ref: "#/components/schemas/models.BlockStore"
        object:
          type: array
          items:
            $ref: "#/components/schemas/models.ObjectStore"
    models.User:
      type: object
      properties:
        email:
          type: string
        firstName:
          type: string
        id:
          type: string
        lastName:
          type: string
        username:
          type: string
    models.WorkspaceSettings:
      type: object
      properties:
        account:
          type: string
        id:
          type: string
        last_updated:
          type: string
        name:
          type: string
        owner:
          type: string
        status:
          type: string
        stores:
          type: array
          items:
            $ref: "#/components/schemas/models.Stores"
    services.FileDeleteResponse:
      type: object
      properties:
        deleted:
          type: array
          items:
            type: string
        failed:
          type: array
          items:
            $ref: "#/components/schemas/services.FileFail"
        workspace:
          type: string
    services.FileFail:
      type: object
      properties:
        error:
          type: string
        fileName:
          type: string
    services.FileItem:
      type: object
      properties:
        etag:
          type: string
        fileName:
          type: string
        lastModified:
          type: string
        size:
          type: integer
        storeType:
          type: string
    services.FileListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/services.FileItem"
        workspace:
          type: string
    services.FileMetadataResponse:
      type: object
      properties:
        item:
          $ref: "#/components/schemas/services.FileItem"
        workspace:
          type: string
    services.FileUploadResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/services.FileItem"
        workspace:
          type: string
